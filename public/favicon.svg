<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Note stem -->
  <rect x="18" y="5" width="2" height="18" rx="1" fill="white"/>

  <!-- Note head as "0" -->
  <ellipse cx="14" cy="23" rx="5.5" ry="4.2" fill="white"/>
  <ellipse cx="14" cy="23" rx="3" ry="2" fill="url(#bg)"/>

  <!-- Flag -->
  <path d="M20 5 Q26 6 24 11 Q23 13.5 20 13" fill="white"/>

  <!-- Tiny binary digits -->
  <text font-family="monospace" font-weight="bold" fill="white" opacity="0.3" font-size="5">
    <tspan x="22" y="20">1</tspan>
    <tspan x="21" y="10">0</tspan>
  </text>
  <text font-family="monospace" font-weight="bold" fill="white" opacity="0.2" font-size="4.5">
    <tspan x="5" y="11">1</tspan>
    <tspan x="7" y="17">0</tspan>
  </text>
</svg>
