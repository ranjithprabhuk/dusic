<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sound wave arcs (left side) -->
  <path d="M140 256 Q140 190 170 150" stroke="url(#wave)" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M110 256 Q110 165 155 110" stroke="url(#wave)" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M140 256 Q140 322 170 362" stroke="url(#wave)" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M110 256 Q110 347 155 402" stroke="url(#wave)" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Music note -->
  <path d="M240 130 L240 340 Q240 390 290 390 Q340 390 340 340 Q340 290 290 290 Q265 290 240 305 L240 130 Z" fill="white"/>
  <!-- Second note head connected by beam -->
  <path d="M240 130 L400 105 L400 280 Q400 330 350 330 Q300 330 300 280 Q300 230 350 230 Q375 230 400 245 L400 105" fill="white"/>
  <!-- Beam connecting the two stems -->
  <rect x="240" y="105" width="160" height="25" rx="4" fill="white"/>
</svg>
